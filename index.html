// APP
// ═══════════════════════════════════════════
function App() {
  const [user, setUser] = useState(loadData('currentUser', null));
  const [screen, setScreen] = useState('home');
  const [screenData, setScreenData] = useState(null);
  const [progress, setProgress] = useState(loadData(`progress_${user}`, {
    hiraLearned:[], kataLearned:[], vocabLearned:[], stamps:['first_login'],
    quizCount:0, battleCount:0, bestQuizScore:0, loginDays:[], streak:0,
  }));

  useEffect(() => {
    if (user) {
      const p = loadData(`progress_${user}`, {
        hiraLearned:[], kataLearned:[], vocabLearned:[], stamps:[],
        quizCount:0, battleCount:0, bestQuizScore:0, loginDays:[], streak:0,
      });
      if (!p.loginDays.includes(today())) {
        p.loginDays.push(today());
        // Calculate streak
        const days = p.loginDays.sort();
        let streak = 1;
        for (let i = days.length - 1; i > 0; i--) {
          const d1 = new Date(days[i]), d2 = new Date(days[i-1]);
          if ((d1 - d2) / 86400000 === 1) streak++; else break;
        }
        p.streak = streak;
        if (streak >= 3 && !p.stamps.includes('streak_3')) p.stamps.push('streak_3');
        if (streak >= 7 && !p.stamps.includes('streak_7')) p.stamps.push('streak_7');
      }
      if (!p.stamps.includes('first_login')) p.stamps.push('first_login');
      setProgress(p);
      saveData(`progress_${user}`, p);
    }
  }, [user]);

  const updateProgress = useCallback((updater) => {
    setProgress(prev => {
      const next = typeof updater === 'function' ? updater(prev) : { ...prev, ...updater };
      saveData(`progress_${user}`, next);
      return next;
    });
  }, [user]);

  const navigate = (s, data = null) => { setScreen(s); setScreenData(data); };

  const selectUser = (u) => { setUser(u); saveData('currentUser', u); navigate('menu'); };
  const logout = () => { setUser(null); saveData('currentUser', null); navigate('home'); };

  if (!user || screen === 'home') return <HomeScreen onSelect={selectUser} />;

  const screens = {
    menu: <MenuScreen user={user} progress={progress} navigate={navigate} onLogout={logout} />,
    hiragana: <KanaScreen type="hiragana" data={HIRAGANA} progress={progress} updateProgress={updateProgress} navigate={navigate} />,
    katakana: <KanaScreen type="katakana" data={KATAKANA} progress={progress} updateProgress={updateProgress} navigate={navigate} />,
    vocab: <VocabScreen progress={progress} updateProgress={updateProgress} navigate={navigate} category={screenData} />,
    vocabCat: <VocabCatScreen navigate={navigate} progress={progress} />,
    mission: <MissionScreen user={user} progress={progress} updateProgress={updateProgress} navigate={navigate} />,
    quiz: <QuizScreen progress={progress} updateProgress={updateProgress} navigate={navigate} />,
    battle: <BattleScreen progress={progress} updateProgress={updateProgress} navigate={navigate} />,
    stamps: <StampScreen progress={progress} navigate={navigate} />,
    stats: <StatsScreen user={user} progress={progress} navigate={navigate} />,
  };

  return screens[screen] || <MenuScreen user={user} progress={progress} navigate={navigate} onLogout={logout} />;
}

  const kPct = Math.round((progress.kataLearned.length / KATAKANA.length) * 100);
  const items = [
    { id:'hiragana', icon:'あ', label:'히라가나', sub:`${progress.hiraLearned.length}/${HIRAGANA.length}`, pct:hPct, color:'primary' },
    { id:'katakana', icon:'ア', label:'가타카나', sub:`${progress.kataLearned.length}/${KATAKANA.length}`, pct:kPct, color:'accent' },
    { id:'vocabCat', icon:'📚', label:'단어 학습', sub:`${progress.vocabLearned.length}/${VOCAB.length}`, pct:Math.round((progress.vocabLearned.length/VOCAB.length)*100), color:'sakura' },
    { id:'mission', icon:'🎯', label:'오늘의 미션', sub:'매일 도전!', color:'primary' },
    { id:'quiz', icon:'❓', label:'퀴즈', sub:`최고 ${progress.bestQuizScore}점`, color:'accent' },
    { id:'battle', icon:'⚔️', label:'대결 모드', sub:'가족 대결', color:'sakura' },
    { id:'stamps', icon:'🏅', label:'내 스탬프', sub:`${progress.stamps.length}/${STAMPS.length}`, color:'primary' },
    { id:'stats', icon:'📊', label:'진도 현황', sub:`${progress.streak}일 연속`, color:'accent' },
  ];
  const uc = user === '지후파파' ? 'primary' : user === '지후' ? 'sakura' : 'accent';
  return (
    <div className="min-h-screen bg-gradient-to-b from-primary-50 to-white p-4 pb-8">
      <div className="flex items-center justify-between mb-6">
        <div className="flex items-center gap-3">
          <span className="text-3xl">{user === '지후파파' ? '👨' : user === '지후' ? '👧' : '👩'}</span>
          <div>
            <div className="font-bold text-lg text-gray-800">{user}</div>
            <div className="text-sm text-gray-400">🔥 {progress.streak}일 연속</div>
          </div>
        </div>
        <button onClick={onLogout} className="text-sm text-gray-400 hover:text-gray-600">사용자 변경</button>
      </div>
      <div className="grid grid-cols-2 gap-4">
        {items.map((item, i) => (
          <button key={item.id} onClick={() => navigate(item.id)}
            className="slide-up bg-white rounded-2xl shadow-md p-5 flex flex-col items-center gap-2 hover:shadow-lg border border-gray-100 kana-card"
            style={{ animationDelay: `${i * 0.05}s` }}>
            <span className="text-4xl jp">{item.icon}</span>
            <span className="font-bold text-gray-800">{item.label}</span>
            <span className="text-xs text-gray-400">{item.sub}</span>
            {item.pct !== undefined && (
              <div className="w-full bg-gray-100 rounded-full h-2 mt-1">
                <div className={`bg-${item.color}-400 h-2 rounded-full transition-all`} style={{width:`${item.pct}%`}} />
              </div>
            )}
          </button>
        ))}
      </div>
    </div>
  );
}

    <button onClick={() => navigate(to)} className="flex items-center gap-1 text-primary-500 font-bold mb-4 hover:text-primary-700">
      <span>←</span> <span>돌아가기</span>
    </button>
  );
}

// ═══════════════════════════════════════════
// WRITING CANVAS COMPONENT
// ═══════════════════════════════════════════
function WritingCanvas({ char, onComplete, resetKey }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasStrokes, setHasStrokes] = useState(false);
  const strokes = STROKE_ORDER[char] || [];

  const initCanvas = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;
    // Draw guide character
    ctx.fillStyle = '#EDE9FE';
    ctx.font = `bold ${w * 0.7}px "Noto Sans JP", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(char, w / 2, h / 2);
    // Draw border
    ctx.strokeStyle = '#DDD6FE';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(2, 2, w - 4, h - 4);
    // Cross guides
    ctx.beginPath();
    ctx.moveTo(w / 2, 4); ctx.lineTo(w / 2, h - 4);
    ctx.moveTo(4, h / 2); ctx.lineTo(w - 4, h / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    // Draw stroke order numbers on canvas
    const colors = ['#EF4444','#F97316','#EAB308','#22C55E','#3B82F6','#8B5CF6','#EC4899'];
    strokes.forEach((s, i) => {
      const cx = s.x * w, cy = s.y * h;
      const r = 10;
      const col = colors[i % colors.length];
      // Circle background
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
      // Number
      ctx.fillStyle = '#FFF';
      ctx.font = `bold 12px "Noto Sans KR", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i + 1), cx, cy);
      // Arrow
      ctx.fillStyle = col;
      ctx.font = `14px sans-serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(s.dir, cx + r + 2, cy);
    });
    setHasStrokes(false);
  }, [char, strokes]);

  useEffect(() => { initCanvas(); }, [char, resetKey, initCanvas]);

  const getPos = (e) => {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const startDraw = (e) => {
    e.preventDefault();
    setDrawing(true);
    setHasStrokes(true);
    const ctx = canvasRef.current.getContext('2d');
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.strokeStyle = '#6D28D9';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  };

  const draw = (e) => {
    e.preventDefault();
    if (!drawing) return;
    const ctx = canvasRef.current.getContext('2d');
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  };

  const endDraw = (e) => {
    e.preventDefault();
    setDrawing(false);
  };

  const handleComplete = () => {
    onComplete();
    // Canvas will be reset via resetKey change
  };

  return (
    <div className="flex flex-col items-center">
      <canvas ref={canvasRef}
        className="rounded-2xl bg-white border-2 border-primary-200 touch-none cursor-crosshair"
        style={{ width: 160, height: 160 }}
        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw} />
      <div className="flex gap-3 mt-2">
        <button onClick={initCanvas} className="text-xs text-gray-400 hover:text-gray-600 px-3 py-1 bg-gray-50 rounded-full">🗑 지우기</button>
        {hasStrokes && <button onClick={handleComplete} className="text-xs text-white font-bold px-3 py-1 bg-primary-500 rounded-full">✓ 완료</button>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// KANA DETAIL (Flashcard + Writing Practice)
// ═══════════════════════════════════════════
function KanaDetail({ item, selected, data, learned, setSelected, markLearned }) {
  const [mode, setMode] = useState('card'); // 'card' or 'write'
  const [writeCount, setWriteCount] = useState(0);
  const [resetKey, setResetKey] = useState(0);
  const WRITE_GOAL = 5;
  const strokes = STROKE_ORDER[item.char] || [];

  useEffect(() => {
    setMode('card');
    setWriteCount(0);
    setResetKey(0);
  }, [selected]);

  const handleWriteComplete = () => {
    const next = writeCount + 1;
    setWriteCount(next);
    setResetKey(k => k + 1); // triggers canvas reset
    if (next >= WRITE_GOAL) {
      speak('すごい');
    }
  };

  if (mode === 'write') {
    const done = writeCount >= WRITE_GOAL;
    return (
      <div className="min-h-screen bg-gradient-to-b from-primary-50 to-white p-4 flex flex-col items-center">
        <div className="w-full max-w-sm">
          <div className="flex items-center justify-between mb-3">
            <button onClick={() => setMode('card')} className="text-primary-500 font-bold text-sm">← 돌아가기</button>
            <div className="text-sm font-bold text-gray-400">{writeCount} / {WRITE_GOAL}</div>
          </div>
          <div className="flex items-center justify-center gap-3 mb-3">
            <button onClick={() => speak(item.char)} className="text-6xl jp text-primary-700">{item.char}</button>
            <div>
              <div className="text-xl text-primary-400 font-bold">{item.romaji}</div>
              <div className="text-lg text-sakura-500 font-bold">{item.pron}</div>
            </div>
          </div>
          {/* Stroke order guide */}
          {strokes.length > 0 && (
            <div className="bg-white rounded-xl p-3 mb-3 shadow-sm">
              <div className="text-xs font-bold text-gray-500 mb-1">✏️ {strokes.length}획 — 캔버스의 번호를 따라가세요!</div>
              <div className="flex flex-wrap gap-1">
                {strokes.map((s, i) => {
                  const colors = ['bg-red-100 text-red-600','bg-orange-100 text-orange-600','bg-yellow-100 text-yellow-700','bg-green-100 text-green-600','bg-blue-100 text-blue-600','bg-purple-100 text-purple-600','bg-pink-100 text-pink-600'];
                  const nums = '❶❷❸❹❺❻❼';
                  return <span key={i} className={`text-xs rounded-full px-2 py-0.5 font-bold ${colors[i % colors.length]}`}>{nums[i]}{s.dir}</span>;
                })}
              </div>
            </div>
          )}
          <div className="bg-primary-100 rounded-full h-3 mb-4">
            <div className="bg-primary-500 h-3 rounded-full transition-all" style={{width:`${(writeCount/WRITE_GOAL)*100}%`}} />
          </div>
          <p className="text-center text-sm text-gray-500 mb-4">
            {done ? '🎉 5번 모두 완료!' : `따라 써보세요! (${writeCount + 1}번째)`}
          </p>
          {!done ? (
            <div className="flex justify-center">
              <WritingCanvas char={item.char} onComplete={handleWriteComplete} resetKey={resetKey} />
            </div>
          ) : (
            <div className="text-center pop-in">
              <div className="text-6xl mb-3">🌟</div>
              <p className="text-lg font-bold text-primary-600 mb-4">잘 썼어요!</p>
              <div className="flex gap-3 justify-center">
                <button onClick={() => setWriteCount(0)}
                  className="bg-gray-100 rounded-xl px-5 py-3 font-bold text-gray-600">다시 쓰기</button>
                <button onClick={() => { markLearned(item.char); setSelected(selected < data.length - 1 ? selected + 1 : 0); }}
                  className="bg-primary-500 text-white rounded-xl px-5 py-3 font-bold">다음 글자 →</button>
              </div>
            </div>
          )}
          <div className="flex justify-center gap-1 mt-5">
            {Array.from({length: WRITE_GOAL}).map((_, i) => (
              <div key={i} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${
                i < writeCount ? 'bg-primary-400 text-white' : 'bg-gray-100 text-gray-300'}`}>
                {i < writeCount ? '✓' : i + 1}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gradient-to-b from-primary-50 to-white p-6 flex flex-col items-center justify-center">
      <div className="pop-in bg-white rounded-3xl shadow-xl p-10 flex flex-col items-center max-w-sm w-full">
        <button onClick={() => speak(item.char)} className="text-9xl jp text-primary-700 mb-4 hover:scale-110 transition-transform">{item.char}</button>
        <div className="text-3xl text-primary-400 font-bold mb-1">{item.romaji}</div>
        <div className="text-2xl text-sakura-500 font-bold mb-2">{item.pron}</div>
        <button onClick={() => speak(item.char)} className="bg-primary-100 text-primary-600 rounded-full px-6 py-2 font-bold mb-3 hover:bg-primary-200">
          🔊 발음 듣기
        </button>
        {KANA_EXAMPLES[item.char] && (
          <div className="bg-accent-50 rounded-xl p-3 mb-3 w-full">
            <div className="text-xs font-bold text-gray-500 mb-2 text-center">📚 예시 단어</div>
            <div className="flex flex-col gap-1">
              {KANA_EXAMPLES[item.char].map((ex, i) => (
                <button key={i} onClick={() => speak(ex.jp)} className="flex items-center gap-2 text-left hover:bg-accent-100 rounded-lg px-2 py-1 transition-colors">
                  <span className="text-lg">{ex.emoji}</span>
                  <span className="text-base jp font-bold text-gray-700">{ex.jp}</span>
                  <span className="text-sm text-sakura-500 font-medium">{ex.pron}</span>
                  <span className="text-sm text-gray-400">{ex.meaning}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        {strokes.length > 0 && (
          <div className="bg-primary-50 rounded-xl p-3 mb-3 w-full">
            <div className="text-xs font-bold text-gray-500 mb-1 text-center">{strokes.length}획</div>
            <div className="flex flex-wrap gap-1 justify-center">
              {strokes.map((s, i) => {
                const colors = ['bg-red-100 text-red-600','bg-orange-100 text-orange-600','bg-yellow-100 text-yellow-700','bg-green-100 text-green-600','bg-blue-100 text-blue-600','bg-purple-100 text-purple-600','bg-pink-100 text-pink-600'];
                const nums = '❶❷❸❹❺❻❼';
                return <span key={i} className={`text-xs rounded-full px-2 py-0.5 font-bold shadow-sm ${colors[i % colors.length]}`}>{nums[i]}{s.dir}</span>;
              })}
            </div>
          </div>
        )}
        <button onClick={() => setMode('write')}
          className="bg-accent-100 text-accent-600 rounded-full px-6 py-2 font-bold mb-6 hover:bg-accent-200">
          ✏️ 따라쓰기 (5회)
        </button>
        <div className="flex gap-3 w-full">
          <button onClick={() => { setSelected(selected > 0 ? selected - 1 : data.length - 1); }}
            className="flex-1 bg-gray-100 rounded-xl py-3 font-bold text-gray-600 hover:bg-gray-200">← 이전</button>
          <button onClick={() => { markLearned(item.char); setSelected(selected < data.length - 1 ? selected + 1 : 0); }}
            className="flex-1 bg-primary-500 text-white rounded-xl py-3 font-bold hover:bg-primary-600">
            {learned.includes(item.char) ? '다음 →' : '배웠어요! ✓'}
          </button>
        </div>
      </div>

  );
}

// KANA LEARNING SCREEN
// ═══════════════════════════════════════════
function KanaScreen({ type, data, progress, updateProgress, navigate }) {
  const [selected, setSelected] = useState(null);
  const [showRomaji, setShowRomaji] = useState(true);
  const isHira = type === 'hiragana';
  const learned = isHira ? progress.hiraLearned : progress.kataLearned;
  const title = isHira ? '히라가나' : '가타카나';
  const rows = [
    { label: isHira?'あ행':'ア행', start:0, count:5 },
    { label: isHira?'か행':'カ행', start:5, count:5 },
    { label: isHira?'さ행':'サ행', start:10, count:5 },
    { label: isHira?'た행':'タ행', start:15, count:5 },
    { label: isHira?'な행':'ナ행', start:20, count:5 },
    { label: isHira?'は행':'ハ행', start:25, count:5 },
    { label: isHira?'ま행':'マ행', start:30, count:5 },
    { label: isHira?'や행':'ヤ행', start:35, count:3 },
    { label: isHira?'ら행':'ラ행', start:38, count:5 },
    { label: isHira?'わ행':'ワ행', start:43, count:3 },
  ];

  const markLearned = (char) => {
    const key = isHira ? 'hiraLearned' : 'kataLearned';
    if (!learned.includes(char)) {
      const newLearned = [...learned, char];
      const updates = { [key]: newLearned };
      // Check stamps
      if (newLearned.length >= 10) {
        const stampId = isHira ? 'hira_10' : 'kata_10';
        if (!progress.stamps.includes(stampId)) updates.stamps = [...progress.stamps, stampId];
      }
      if (newLearned.length >= data.length) {
        const stampId = isHira ? 'hira_all' : 'kata_all';
        const stamps = updates.stamps || progress.stamps;
        if (!stamps.includes(stampId)) updates.stamps = [...stamps, stampId];
      }
      updateProgress(prev => ({ ...prev, ...updates }));
    }
  };

  if (selected !== null) {
    const item = data[selected];
    return <KanaDetail item={item} selected={selected} data={data} learned={learned}
      setSelected={setSelected} markLearned={markLearned} />;
  }

  return (
    <div className="min-h-screen bg-gradient-to-b from-primary-50 to-white p-4">
      <BackBtn navigate={navigate} />
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-2xl font-bold text-primary-700">{title}</h2>
        <label className="flex items-center gap-2 text-sm text-gray-500">
          <span>로마자</span>
          <input type="checkbox" checked={showRomaji} onChange={e => setShowRomaji(e.target.checked)} className="accent-primary-500" />
        </label>
      </div>
      <div className="bg-primary-100 rounded-full h-3 mb-6">
        <div className="bg-primary-500 h-3 rounded-full transition-all" style={{width:`${(learned.length/data.length)*100}%`}} />
      </div>
      <p className="text-sm text-gray-400 mb-4 text-center">{learned.length} / {data.length} 학습 완료</p>
      {rows.map(row => (
        <div key={row.label} className="mb-4">
          <div className="text-xs text-gray-400 mb-1 font-bold">{row.label}</div>
          <div className="flex gap-2 flex-wrap">
            {data.slice(row.start, row.start + row.count).map((item, i) => {
              const idx = row.start + i;
              const isLearned = learned.includes(item.char);
              return (
                <button key={item.char} onClick={() => { speak(item.char); setSelected(idx); }}
                  className={`kana-card w-16 h-20 rounded-xl flex flex-col items-center justify-center shadow-sm border-2 ${
                    isLearned ? 'bg-primary-100 border-primary-300' : 'bg-white border-gray-100'
                  }`}>
                  <span className={`text-2xl jp ${isLearned ? 'text-primary-700' : 'text-gray-700'}`}>{item.char}</span>
                  {showRomaji && <span className="text-xs text-gray-400">{item.romaji}</span>}
                  <span className="text-xs text-primary-400 font-bold">{item.pron}</span>
                  {isLearned && <span className="text-xs">✓</span>}
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function VocabScreen({ progress, updateProgress, navigate, category }) {
  const words = VOCAB.filter(v => v.cat === category);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const word = words[idx];

  const markLearned = () => {
    if (!progress.vocabLearned.includes(word.jp)) {
      const newVocab = [...progress.vocabLearned, word.jp];
      const updates = { vocabLearned: newVocab };
      if (newVocab.length >= 10 && !progress.stamps.includes('vocab_10'))
        updates.stamps = [...progress.stamps, 'vocab_10'];
      if (newVocab.length >= VOCAB.length) {
        const stamps = updates.stamps || progress.stamps;
        if (!stamps.includes('vocab_all')) updates.stamps = [...stamps, 'vocab_all'];
      }
      updateProgress(prev => ({ ...prev, ...updates }));
    }
    setFlipped(false);
    setIdx(idx < words.length - 1 ? idx + 1 : 0);
  };

  return (
    <div className="min-h-screen bg-gradient-to-b from-sakura-50 to-white p-4 flex flex-col">
      <BackBtn navigate={navigate} to="vocabCat" />

      <p className="text-sm text-gray-400 mb-6">{idx + 1} / {words.length}</p>
      <div className="flex-1 flex items-center justify-center">
        <button onClick={() => { setFlipped(!flipped); speak(word.jp); }}
          className="pop-in bg-white rounded-3xl shadow-xl w-72 h-96 flex flex-col items-center justify-center kana-card">
          <span className="text-7xl mb-4">{word.emoji}</span>
          <span className="text-4xl jp font-bold text-gray-800 mb-1">{word.jp}</span>
          <span className="text-lg text-sakura-400 font-bold mb-2">{word.pron}</span>
          {flipped ? (
            <span className="text-xl text-sakura-500 font-bold slide-up">{word.meaning}</span>
          ) : (
            <span className="text-sm text-gray-300">탭해서 뜻 보기</span>
          )}

          className="flex-1 bg-gray-100 rounded-xl py-4 font-bold text-gray-600">← 이전</button>

          {progress.vocabLearned.includes(word.jp) ? '다음 →' : '배웠어요! ✓'}

      </div>
    </div>
  );
}

// QUIZ SCREEN
// ═══════════════════════════════════════════
function QuizScreen({ progress, updateProgress, navigate }) {
  const [phase, setPhase] = useState('setup'); // setup, playing, result
  const [quizType, setQuizType] = useState('hiragana');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(null);
  const [anim, setAnim] = useState('');

  const startQuiz = (type) => {
    setQuizType(type);
    let pool;
    if (type === 'hiragana') pool = HIRAGANA.map(h => ({ q: h.char, a: h.romaji, pron: h.pron, type: 'kana' }));
    else if (type === 'katakana') pool = KATAKANA.map(k => ({ q: k.char, a: k.romaji, pron: k.pron, type: 'kana' }));
    else pool = VOCAB.map(v => ({ q: `${v.emoji} ${v.jp}`, a: v.meaning, pron: v.pron, type: 'vocab' }));

    const qs = shuffle(pool).slice(0, 10).map(q => {
      const wrongPool = pool.filter(p => p.a !== q.a);
      const wrongs = shuffle(wrongPool).slice(0, 3).map(w => w.a);
      return { ...q, options: shuffle([q.a, ...wrongs]) };
    });
    setQuestions(qs);
    setCurrent(0); setScore(0); setAnswered(null);
    setPhase('playing');
  };

  const answer = (opt) => {
    if (answered !== null) return;
    const correct = opt === questions[current].a;
    setAnswered(opt);
    if (correct) { setScore(s => s + 1); setAnim('bounce'); speak('すごい'); }
    else { setAnim('shake'); }
    setTimeout(() => {
      setAnim('');
      if (current < questions.length - 1) { setCurrent(c => c + 1); setAnswered(null); }
      else {
        const finalScore = correct ? score + 1 : score;
        const updates = { quizCount: progress.quizCount + 1, bestQuizScore: Math.max(progress.bestQuizScore, finalScore * 10) };
        if (progress.quizCount + 1 >= 5 && !progress.stamps.includes('quiz_5'))
          updates.stamps = [...progress.stamps, 'quiz_5'];
        if (finalScore === 10) {
          const stamps = updates.stamps || progress.stamps;
          if (!stamps.includes('quiz_perfect')) updates.stamps = [...stamps, 'quiz_perfect'];
        }
        updateProgress(prev => ({ ...prev, ...updates }));
        setPhase('result');
      }
    }, 1200);
  };

  if (phase === 'setup') return (
    <div className="min-h-screen bg-gradient-to-b from-accent-50 to-white p-4">
      <BackBtn navigate={navigate} />
      <h2 className="text-2xl font-bold text-accent-500 mb-6">❓ 퀴즈</h2>
      <p className="text-gray-500 mb-8 text-center">어떤 퀴즈를 풀까요? (10문제)</p>
      <div className="space-y-4">
        {[['hiragana','あ','히라가나 퀴즈'],['katakana','ア','가타카나 퀴즈'],['vocab','📚','단어 퀴즈']].map(([id,icon,label]) => (
          <button key={id} onClick={() => startQuiz(id)}
            className="w-full bg-white rounded-2xl shadow-md p-6 flex items-center gap-4 kana-card hover:shadow-lg">
            <span className="text-4xl jp">{icon}</span>
            <span className="text-xl font-bold text-gray-800">{label}</span>
          </button>
        ))}
      </div>
    </div>
  );

  if (phase === 'result') {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div className="min-h-screen bg-gradient-to-b from-accent-50 to-white p-6 flex flex-col items-center justify-center">
        <div className="pop-in text-8xl mb-4">{pct >= 80 ? '🎉' : pct >= 50 ? '👏' : '💪'}</div>
        <h2 className="text-3xl font-bold text-accent-500 mb-2">{score} / {questions.length}</h2>
        <p className="text-gray-500 mb-8">{pct >= 80 ? '대단해요!' : pct >= 50 ? '잘했어요!' : '다시 도전해봐요!'}</p>
        <div className="flex gap-4">
          <button onClick={() => setPhase('setup')} className="bg-accent-500 text-white rounded-xl px-8 py-3 font-bold">다시 풀기</button>
          <button onClick={() => navigate('menu')} className="bg-gray-200 rounded-xl px-8 py-3 font-bold text-gray-600">메뉴로</button>
        </div>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div className="min-h-screen bg-gradient-to-b from-accent-50 to-white p-4 flex flex-col">
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setPhase('setup')} className="text-accent-500 font-bold text-sm">← 돌아가기</button>
        <span className="text-sm font-bold text-gray-400">{current + 1} / {questions.length}</span>
        <span className="text-sm font-bold text-accent-500">⭐ {score}점</span>
      </div>
      <div className="bg-accent-100 rounded-full h-2 mb-8">
        <div className="bg-accent-500 h-2 rounded-full transition-all" style={{width:`${((current+1)/questions.length)*100}%`}} />
      </div>
      <div className={`flex-1 flex flex-col items-center justify-center ${anim}`}>
        <div className="text-6xl jp font-bold text-gray-800 mb-2">{q.q}</div>
        <button onClick={() => speak(q.type === 'vocab' ? q.q.replace(/[^\u3000-\u9FFF\u30A0-\u30FF\u3040-\u309F]/g,'') : q.q)} className="text-sm text-accent-400 font-bold mb-6">🔊 발음 듣기</button>
        <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
          {q.options.map((opt, i) => {
            let cls = 'bg-white border-2 border-gray-200 text-gray-800';
            if (answered !== null) {
              if (opt === q.a) cls = 'bg-green-100 border-2 border-green-400 text-green-700';
              else if (opt === answered) cls = 'bg-red-100 border-2 border-red-400 text-red-700';
            }
            return (
              <button key={i} onClick={() => answer(opt)}
                className={`${cls} rounded-2xl p-4 font-bold text-lg kana-card shadow-sm`}>
                {opt}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// BATTLE SCREEN
// ═══════════════════════════════════════════
function BattleScreen({ progress, updateProgress, navigate }) {
  const [phase, setPhase] = useState('setup');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [turn, setTurn] = useState(0); // 0=아빠, 1=딸
  const [scores, setScores] = useState([0, 0]);
  const [answered, setAnswered] = useState(null);
  const [anim, setAnim] = useState('');
  const players = ['👨 지후파파', '👧 지후'];

  const startBattle = () => {
    const pool = [...HIRAGANA.map(h => ({ q: h.char, a: h.romaji, pron: h.pron, type: 'kana' })), ...VOCAB.slice(0, 20).map(v => ({ q: `${v.emoji} ${v.jp}`, a: v.meaning, pron: v.pron, type: 'vocab' }))];
    const qs = shuffle(pool).slice(0, 10).map(q => {
      const wrongs = shuffle(pool.filter(p => p.a !== q.a)).slice(0, 3).map(w => w.a);
      return { ...q, options: shuffle([q.a, ...wrongs]) };
    });
    setQuestions(qs); setCurrent(0); setTurn(0); setScores([0, 0]); setAnswered(null);
    setPhase('playing');
  };

  const answer = (opt) => {
    if (answered !== null) return;
    const correct = opt === questions[current].a;
    setAnswered(opt);
    if (correct) {
      const ns = [...scores]; ns[turn]++; setScores(ns);
      setAnim('bounce');
    } else setAnim('shake');
    setTimeout(() => {
      setAnim('');
      setAnswered(null);
      if (current < questions.length - 1) {
        setCurrent(c => c + 1);
        setTurn(t => 1 - t);
      } else {
        const updates = { battleCount: progress.battleCount + 1 };
        if (!progress.stamps.includes('battle_1')) updates.stamps = [...progress.stamps, 'battle_1'];
        updateProgress(prev => ({ ...prev, ...updates }));
        setPhase('result');
      }
    }, 1200);
  };

  if (phase === 'setup') return (
    <div className="min-h-screen bg-gradient-to-b from-sakura-50 to-white p-4 flex flex-col items-center justify-center">
      <BackBtn navigate={navigate} />
      <div className="text-8xl mb-6">⚔️</div>
      <h2 className="text-3xl font-bold text-sakura-600 mb-4">대결 모드</h2>
      <p className="text-gray-500 mb-2">번갈아가며 문제를 풀어요!</p>
      <p className="text-gray-400 text-sm mb-8">히라가나 + 단어 섞어서 10문제</p>
      <div className="flex gap-8 mb-8">
        <div className="text-center"><div className="text-5xl mb-2">👨</div><div className="font-bold">지후파파</div></div>
        <div className="text-4xl font-bold text-sakura-400 self-center">VS</div>
        <div className="text-center"><div className="text-5xl mb-2">👧</div><div className="font-bold">지후</div></div>
      </div>
      <button onClick={startBattle} className="bg-sakura-500 text-white rounded-2xl px-10 py-4 text-xl font-bold shadow-lg hover:bg-sakura-600 kana-card">
        시작! 🚀
      </button>
    </div>
  );

  if (phase === 'result') {
    const winner = scores[0] > scores[1] ? '👨 아빠' : scores[1] > scores[0] ? '👧 딸' : '무승부';
    return (
      <div className="min-h-screen bg-gradient-to-b from-sakura-50 to-white p-6 flex flex-col items-center justify-center">
        <div className="pop-in text-8xl mb-4">🏆</div>
        <h2 className="text-2xl font-bold text-sakura-600 mb-6">{winner === '무승부' ? '무승부! 🤝' : `${winner} 승리!`}</h2>
        <div className="flex gap-12 mb-8">
          <div className="text-center">
            <div className="text-5xl mb-2">👨</div>
            <div className="text-3xl font-bold text-primary-600">{scores[0]}점</div>
          </div>
          <div className="text-center">
            <div className="text-5xl mb-2">👧</div>
            <div className="text-3xl font-bold text-sakura-500">{scores[1]}점</div>
          </div>
        </div>
        <div className="flex gap-4">
          <button onClick={startBattle} className="bg-sakura-500 text-white rounded-xl px-8 py-3 font-bold">한판 더!</button>
          <button onClick={() => navigate('menu')} className="bg-gray-200 rounded-xl px-8 py-3 font-bold text-gray-600">메뉴로</button>
        </div>
      </div>
    );
  }

  const q = questions[current];
  return (
    <div className={`min-h-screen p-4 flex flex-col ${turn === 0 ? 'bg-gradient-to-b from-primary-50 to-white' : 'bg-gradient-to-b from-sakura-50 to-white'}`}>
      <div className="flex items-center justify-between mb-2">
        <button onClick={() => setPhase('setup')} className="text-sakura-500 font-bold text-sm">← 돌아가기</button>
        <span className="text-sm font-bold text-gray-400">{current + 1} / {questions.length}</span>
      </div>
      <div className="flex items-center justify-between mb-4">
        <div className="flex items-center gap-2">
          <span className="text-2xl">{turn === 0 ? '👨' : '👧'}</span>
          <span className={`font-bold text-lg ${turn === 0 ? 'text-primary-600' : 'text-sakura-500'}`}>{players[turn]}의 차례!</span>
        </div>
      </div>
      <div className="flex justify-center gap-8 mb-4">
        <span className="text-sm font-bold text-primary-500">👨 {scores[0]}</span>
        <span className="text-sm font-bold text-sakura-500">👧 {scores[1]}</span>
      </div>
      <div className={`flex-1 flex flex-col items-center justify-center ${anim}`}>
        <div className="text-6xl jp font-bold text-gray-800 mb-2">{q.q}</div>
        <button onClick={() => speak(q.type === 'vocab' ? q.q.replace(/[^\u3000-\u9FFF\u30A0-\u30FF\u3040-\u309F]/g,'') : q.q)} className="text-sm text-sakura-400 font-bold mb-6">🔊 발음 듣기</button>
        <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
          {q.options.map((opt, i) => {
            let cls = `bg-white border-2 ${turn === 0 ? 'border-primary-200' : 'border-sakura-200'} text-gray-800`;
            if (answered !== null) {
              if (opt === q.a) cls = 'bg-green-100 border-2 border-green-400 text-green-700';
              else if (opt === answered) cls = 'bg-red-100 border-2 border-red-400 text-red-700';
            }
            return (
              <button key={i} onClick={() => answer(opt)}
                className={`${cls} rounded-2xl p-4 font-bold text-lg kana-card shadow-sm`}>{opt}</button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// STAMP SCREEN
// ═══════════════════════════════════════════
function StampScreen({ progress, navigate }) {
  return (
    <div className="min-h-screen bg-gradient-to-b from-primary-50 to-white p-4">
      <BackBtn navigate={navigate} />
      <h2 className="text-2xl font-bold text-primary-700 mb-2">🏅 내 스탬프</h2>
      <p className="text-gray-400 mb-6">{progress.stamps.length} / {STAMPS.length} 획득</p>
      <div className="grid grid-cols-3 gap-3">
        {STAMPS.map(s => {
          const earned = progress.stamps.includes(s.id);
          return (
            <div key={s.id} className={`rounded-2xl p-4 flex flex-col items-center text-center ${
              earned ? 'bg-white shadow-md stamp-earned' : 'bg-gray-100 opacity-40'}`}>
              <span className="text-4xl mb-2">{s.emoji}</span>
              <span className="text-xs font-bold text-gray-700">{s.name}</span>
              <span className="text-xs text-gray-400 mt-1">{s.desc}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// STATS SCREEN
// ═══════════════════════════════════════════
function StatsScreen({ user, progress, navigate }) {
  const hPct = Math.round((progress.hiraLearned.length / HIRAGANA.length) * 100);
  const kPct = Math.round((progress.kataLearned.length / KATAKANA.length) * 100);
  const vPct = Math.round((progress.vocabLearned.length / VOCAB.length) * 100);
  const bars = [
    { label: '히라가나', pct: hPct, color: 'bg-primary-400', count: `${progress.hiraLearned.length}/${HIRAGANA.length}` },
    { label: '가타카나', pct: kPct, color: 'bg-accent-400', count: `${progress.kataLearned.length}/${KATAKANA.length}` },
    { label: '단어', pct: vPct, color: 'bg-sakura-400', count: `${progress.vocabLearned.length}/${VOCAB.length}` },
  ];
  return (
    <div className="min-h-screen bg-gradient-to-b from-accent-50 to-white p-4">
      <BackBtn navigate={navigate} />
      <h2 className="text-2xl font-bold text-accent-500 mb-6">📊 {user}의 진도 현황</h2>
      <div className="bg-white rounded-2xl shadow-md p-6 mb-6">
        <div className="grid grid-cols-3 text-center mb-6">
          <div><div className="text-3xl font-bold text-primary-600">{progress.streak}</div><div className="text-xs text-gray-400">연속 학습일</div></div>
          <div><div className="text-3xl font-bold text-accent-500">{progress.quizCount}</div><div className="text-xs text-gray-400">퀴즈 횟수</div></div>
          <div><div className="text-3xl font-bold text-sakura-500">{progress.stamps.length}</div><div className="text-xs text-gray-400">스탬프</div></div>
        </div>
        {bars.map(b => (
          <div key={b.label} className="mb-4">
            <div className="flex justify-between text-sm mb-1">
              <span className="font-bold text-gray-600">{b.label}</span>
              <span className="text-gray-400">{b.count} ({b.pct}%)</span>
            </div>
            <div className="bg-gray-100 rounded-full h-4">
              <div className={`${b.color} h-4 rounded-full transition-all`} style={{width:`${b.pct}%`}} />
            </div>
          </div>
        ))}
      </div>
      <div className="bg-white rounded-2xl shadow-md p-6">
        <h3 className="font-bold text-gray-700 mb-3">학습 기록</h3>
        <div className="flex flex-wrap gap-1">
          {progress.loginDays.slice(-30).map(d => (
            <div key={d} className="w-6 h-6 rounded bg-primary-300 flex items-center justify-center" title={d}>
              <span className="text-xs text-white font-bold">{parseInt(d.slice(-2))}</span>
            </div>
          ))}
        </div>
        <p className="text-xs text-gray-400 mt-2">최근 30일 학습일</p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
